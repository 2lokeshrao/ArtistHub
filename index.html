  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;background:#FBF8F4;color:#1C1C1E;overflow-x:hidden}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#D4A574;border-radius:99px}
    .scene{perspective:1200px}
    .float-3d{animation:f3d 6s ease-in-out infinite;transform-style:preserve-3d}
    @keyframes f3d{0%,100%{transform:translateY(0) rotateX(2deg) rotateY(-2deg)}50%{transform:translateY(-14px) rotateX(-2deg) rotateY(2deg)}}
    .glass{background:rgba(251,248,244,.65);backdrop-filter:blur(20px) saturate(1.8);-webkit-backdrop-filter:blur(20px) saturate(1.8);border:1px solid rgba(212,165,116,.18)}
    .glass-dark{background:rgba(28,28,30,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(212,165,116,.12)}
    .mesh-bg{background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(212,165,116,.12) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(61,21,32,.08) 0%,transparent 50%),#FBF8F4}
    .reveal{opacity:0;transform:translateY(40px);transition:opacity .7s cubic-bezier(.23,1,.32,1),transform .7s cubic-bezier(.23,1,.32,1)}.reveal.visible{opacity:1;transform:translateY(0)}
    .reveal-left{opacity:0;transform:translateX(-50px);transition:opacity .7s cubic-bezier(.23,1,.32,1),transform .7s cubic-bezier(.23,1,.32,1)}.reveal-left.visible{opacity:1;transform:translateX(0)}
    .reveal-right{opacity:0;transform:translateX(50px);transition:opacity .7s cubic-bezier(.23,1,.32,1),transform .7s cubic-bezier(.23,1,.32,1)}.reveal-right.visible{opacity:1;transform:translateX(0)}
    .reveal-scale{opacity:0;transform:scale(.85);transition:opacity .6s,transform .6s cubic-bezier(.23,1,.32,1)}.reveal-scale.visible{opacity:1;transform:scale(1)}
    #app{animation:pgIn .5s cubic-bezier(.23,1,.32,1)}@keyframes pgIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    #toast-box{position:fixed;top:20px;right:20px;z-index:99999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
    .toast{padding:14px 22px;border-radius:14px;font-size:13px;font-weight:500;color:#fff;transform:translateX(140%);transition:transform .4s cubic-bezier(.23,1,.32,1),opacity .4s;opacity:0;max-width:360px;pointer-events:auto;box-shadow:0 12px 40px rgba(0,0,0,.2)}.toast.show{transform:translateX(0);opacity:1}
    .toast-success{background:linear-gradient(135deg,#2D4A35,#3D5E45);border-left:3px solid #8BD49A}
    .toast-error{background:linear-gradient(135deg,#5A1A1A,#7A2A2A);border-left:3px solid #E87070}
    .toast-info{background:linear-gradient(135deg,#1A2A4A,#2A3A5A);border-left:3px solid #70A8E8}
    .img-wrap{position:relative;overflow:hidden}.img-wrap img{object-fit:cover;transition:transform .7s cubic-bezier(.23,1,.32,1)}.img-wrap:hover img{transform:scale(1.06)}
    .img-fb{display:none}img.err{display:none!important}img.err+.img-fb{display:flex!important}
    .hscroll{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding-bottom:10px;scrollbar-width:none}.hscroll::-webkit-scrollbar{display:none}.hscroll>*{scroll-snap-align:start;flex-shrink:0}
    .cal-cell{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:12px;font-size:13px;cursor:pointer;transition:all .25s;font-weight:400}.cal-cell:hover:not(.empty){background:rgba(212,165,116,.15);transform:scale(1.1)}.cal-cell.today{font-weight:700;box-shadow:inset 0 0 0 2px #D4A574}.cal-cell.busy{background:linear-gradient(135deg,#5A1A1A,#7A2A2A);color:#F5B0B0;box-shadow:0 2px 8px rgba(90,26,26,.3)}.cal-cell.available{background:linear-gradient(135deg,#1A3D20,#2D5A35);color:#B0F5C0;box-shadow:0 2px 8px rgba(26,61,32,.3)}.cal-cell.empty{cursor:default}
    .field{width:100%;padding:12px 16px;border:1.5px solid #E5DED3;border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;background:#fff;color:#1C1C1E;transition:all .3s;outline:none}.field:focus{border-color:#D4A574;box-shadow:0 0 0 4px rgba(212,165,116,.12)}.field::placeholder{color:#B5AFA5}textarea.field{resize:vertical;min-height:60px}
    .btn-gold{background:linear-gradient(135deg,#D4A574,#B8895E,#C78D6D);background-size:200% 200%;animation:shm 3s ease infinite;color:#fff;border:none;padding:13px 28px;border-radius:14px;font-family:'Outfit',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:transform .3s,box-shadow .3s;overflow:hidden}@keyframes shm{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(212,165,116,.35)}.btn-gold:active{transform:translateY(0) scale(.98)}
    .btn-outline{background:transparent;color:#D4A574;border:1.5px solid rgba(212,165,116,.4);padding:12px 28px;border-radius:14px;font-family:'Outfit',sans-serif;font-weight:500;font-size:14px;cursor:pointer;transition:all .3s}.btn-outline:hover{background:rgba(212,165,116,.08);border-color:#D4A574}
    .btn-sm{padding:8px 16px;font-size:13px;border-radius:10px}
    .btn-danger{background:transparent;color:#D45A5A;border:1.5px solid rgba(212,90,90,.3);padding:8px 16px;border-radius:10px;font-family:'Outfit',sans-serif;font-weight:500;font-size:12px;cursor:pointer;transition:all .25s}.btn-danger:hover{background:rgba(212,90,90,.08)}
    .tab-pill{padding:9px 18px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;transition:all .3s;white-space:nowrap;border:none;background:transparent;color:#8A8580;font-family:'Outfit',sans-serif}.tab-pill.active{background:#1C1C1E;color:#E8C08E;box-shadow:0 4px 16px rgba(0,0,0,.15)}.tab-pill:hover:not(.active){background:rgba(0,0,0,.04);color:#1C1C1E}
    .line-gold{height:1px;background:linear-gradient(90deg,transparent,#D4A574,transparent)}
    .line-gold-left{height:2.5px;width:40px;background:linear-gradient(90deg,#D4A574,transparent);border-radius:99px}
    .deco-orb{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0}
    .deco-ring{position:absolute;border-radius:50%;pointer-events:none;z-index:0;animation:spn 20s linear infinite}@keyframes spn{to{transform:rotate(360deg)}}
    .particle-3d{position:fixed;width:3px;height:3px;background:#D4A574;border-radius:50%;pointer-events:none;z-index:0;opacity:0}
    @keyframes pFl{0%{opacity:0;transform:translateY(100vh) translateX(0) scale(0)}15%{opacity:.3}85%{opacity:.08}100%{opacity:0;transform:translateY(-10vh) translateX(40px) scale(1)}}
    .bio-reveal{opacity:0;transform:translateY(15px);animation:bIn .8s .4s cubic-bezier(.23,1,.32,1) forwards}@keyframes bIn{to{opacity:1;transform:translateY(0)}}
    .conic-spin{position:absolute;top:-50%;left:-50%;width:200%;height:200%;pointer-events:none;animation:cSp 8s linear infinite}@keyframes cSp{to{transform:rotate(360deg)}}
    .svc-select{cursor:pointer;transition:all .35s cubic-bezier(.23,1,.32,1);border:2px solid transparent}.svc-select:hover{border-color:rgba(212,165,116,.3);transform:translateY(-2px)}.svc-select.chosen{border-color:#D4A574;background:rgba(212,165,116,.05);box-shadow:0 4px 20px rgba(212,165,116,.12)}
    input[type="color"]{-webkit-appearance:none;border:none;width:100%;height:100%;cursor:pointer;border-radius:inherit;padding:0}input[type="color"]::-webkit-color-swatch-wrapper{padding:0}input[type="color"]::-webkit-color-swatch{border:2px solid rgba(212,165,116,.3);border-radius:10px}
    @media(max-width:640px){.cal-cell{width:36px;height:36px;font-size:12px;border-radius:10px}}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body class="min-h-screen">
  <div id="ptcl" aria-hidden="true" style="position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden"></div>
  <div id="toast-box" aria-live="polite"></div>
  <div id="app" class="relative z-10"></div>

<script>
/* ============================================================
   CONSTANTS & DATA
   ============================================================ */
var USERS_K='artisthub_users';
var SESSION_K='artisthub_session';
var DATA_PFX='artisthub_d_';
var OLD_K='artisthub_v4';

function freshData(){
  return {
    profile:{name:'',tagline:'',bio:'',profileImageUrl:'',phone:'',upiQrUrl:'',
      instagram:'',snapchat:'',youtube:'',whatsapp:'',heroBg:'#2A0E16'},
    portfolio:[], services:[], achievements:[], education:[],
    availability:{}, bookings:[], pin:'0000'
  };
}

/* ============================================================
   USER MANAGEMENT
   ============================================================ */
function getUsers(){try{return JSON.parse(localStorage.getItem(USERS_K))||[];}catch(e){return[];}}
function putUsers(u){localStorage.setItem(USERS_K,JSON.stringify(u));}
function getSession(){return localStorage.getItem(SESSION_K)||null;}
function setSession(id){localStorage.setItem(SESSION_K,id);}
function clearSession(){localStorage.removeItem(SESSION_K);}
function getData(id){try{var r=localStorage.getItem(DATA_PFX+id);return r?JSON.parse(r):freshData();}catch(e){return freshData();}}
function putData(id,d){try{localStorage.setItem(DATA_PFX+id,JSON.stringify(d));}catch(e){toast('Storage full!','error');}}
function findUser(id){var users=getUsers();for(var i=0;i<users.length;i++){if(users[i].id===id)return users[i];}return null;}
function findUserByName(n){var users=getUsers();var nl=n.toLowerCase();for(var i=0;i<users.length;i++){if(users[i].displayName.toLowerCase()===nl)return users[i];}return null;}

function createUser(name,pin){
  var users=getUsers();
  if(findUserByName(name))return{ok:false,msg:'Name already taken'};
  if(!/^\d{4}$/.test(pin))return{ok:false,msg:'PIN must be 4 digits'};
  var id=uid();users.push({id:id,displayName:name,pin:pin,createdAt:Date.now()});putUsers(users);
  var oldRaw=localStorage.getItem(OLD_K);
  if(oldRaw&&users.length===1){try{putData(id,JSON.parse(oldRaw));}catch(e){putData(id,freshData());}}
  else{putData(id,freshData());}
  setSession(id);return{ok:true,id:id};
}

function loginUser(name,pin){
  var u=findUserByName(name);
  if(!u)return{ok:false,msg:'User not found'};
  if(u.pin!==pin)return{ok:false,msg:'Wrong PIN'};
  setSession(u.id);return{ok:true,id:u.id};
}

function logoutUser(){clearSession();CU=null;S=null;location.hash='#/';}

/* ============================================================
   APP STATE
   ============================================================ */
var CU=null;
var S=null;
var VD=null;
var VU=null;
var BK_DATA=null;
var BK_USER=null;
var calY,calM,selSvc,selDate,dashTab='profile';

function initAuth(){
  var sid=getSession();
  if(sid){CU=findUser(sid);if(CU)S=getData(CU.id);else clearSession();}
}

/* ============================================================
   UTILITY
   ============================================================ */
function uid(){return 'u_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);}
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}
function handle(u){return u?u.replace(/\/$/,'').split('/').pop().replace('@',''):'';}
function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});}
function fmtPrice(n){return '\u20B9'+Number(n).toLocaleString('en-IN');}

function toast(msg,type){
  if(!type)type='success';
  var el=document.createElement('div');el.className='toast toast-'+type;el.textContent=msg;
  document.getElementById('toast-box').appendChild(el);
  requestAnimationFrame(function(){el.classList.add('show');});
  setTimeout(function(){el.classList.remove('show');setTimeout(function(){el.remove();},400);},3400);
}
function imgErr(el){el.classList.add('err');}

/* ============================================================
   COLOR UTILS
   ============================================================ */
function hex2rgb(h){h=h.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function rgb2hex(r,g,b){return'#'+[r,g,b].map(function(v){return Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0');}).join('');}
function adjCol(h,a){var c=hex2rgb(h);return rgb2hex(c[0]+a,c[1]+a,c[2]+a);}
function isLight(h){var c=hex2rgb(h);return(0.299*c[0]+0.587*c[1]+0.114*c[2])/255>0.52;}
function rgba(h,a){var c=hex2rgb(h);return'rgba('+c[0]+','+c[1]+','+c[2]+','+a+')';}

function heroTheme(hex){
  var L=isLight(hex);
  return{
    bg:'linear-gradient(135deg,'+adjCol(hex,-22)+' 0%,'+hex+' 50%,'+adjCol(hex,14)+' 100%)',
    orb1:rgba(hex,.15),orb2:rgba(adjCol(hex,40),.1),ring:rgba(adjCol(hex,60),.12),
    name:L?'#1C1C1E':'#FBF8F4',nameColor:L?'#1C1C1E':'#FBF8F4',
    tag:L?'rgba(28,28,30,0.45)':'rgba(251,248,244,0.55)',
    bio:L?'rgba(28,28,30,0.55)':'rgba(251,248,244,0.45)',
    tagBdr:L?'rgba(28,28,30,0.12)':'rgba(212,165,116,0.2)',
    tagTxt:L?'rgba(28,28,30,0.4)':'rgba(212,165,116,0.6)',
    line:L?'rgba(28,28,30,0.1)':'rgba(212,165,116,0.4)',
    socBg:L?'rgba(28,28,30,0.06)':'rgba(28,28,30,0.5)',
    socBdr:L?'rgba(28,28,30,0.1)':'rgba(212,165,116,0.2)',
    socTxt:L?'#1C1C1E':'#D4A574',
    photoBdr:L?'rgba(28,28,30,0.1)':'rgba(212,165,116,0.3)',
    fbBg:rgba(hex,.3),fbTxt:rgba(adjCol(hex,100),.3)
  };
}

function achStyle(t){
  if(t==='award')return{bg:'linear-gradient(160deg,#3D1520,#5A2235,#6B3048)',bdr:'1px solid rgba(232,192,142,.25)',shd:'0 10px 35px rgba(61,21,32,.35)',txt:'#FBF8F4',sub:'#E8C08E',mut:'rgba(251,248,244,.4)',icBg:'linear-gradient(135deg,rgba(232,192,142,.2),rgba(232,192,142,.05))',deco:'rgba(232,192,142,.1)',conic:'rgba(232,192,142,.07)',tBg:'rgba(232,192,142,.15)',tTxt:'#E8C08E'};
  if(t==='milestone')return{bg:'linear-gradient(160deg,#1C1C1E,#2C2C2E,#3A3A3C)',bdr:'1px solid rgba(212,165,116,.2)',shd:'0 10px 35px rgba(28,28,30,.3)',txt:'#FBF8F4',sub:'#D4A574',mut:'rgba(251,248,244,.35)',icBg:'linear-gradient(135deg,rgba(212,165,116,.2),rgba(212,165,116,.05))',deco:'rgba(212,165,116,.08)',conic:'rgba(212,165,116,.06)',tBg:'rgba(212,165,116,.12)',tTxt:'#D4A574'};
  return{bg:'linear-gradient(160deg,#FEF9F4,#F8EDE0,#F2DFD0)',bdr:'1px solid rgba(199,141,109,.18)',shd:'0 10px 35px rgba(199,141,109,.12)',txt:'#1C1C1E',sub:'#A06B48',mut:'rgba(28,28,30,.45)',icBg:'linear-gradient(135deg,rgba(199,141,109,.15),rgba(199,141,109,.04))',deco:'rgba(199,141,109,.08)',conic:'rgba(199,141,109,.06)',tBg:'rgba(199,141,109,.1)',tTxt:'#C78D6D'};
}
function achIcon(t){return t==='award'?'<i class="fa-solid fa-trophy text-gold-bright"></i>':t==='milestone'?'<i class="fa-solid fa-star text-gold"></i>':'<i class="fa-solid fa-certificate text-rose-gold"></i>';}

/* ============================================================
   INSTAGRAM / PINTEREST URL RESOLVER
   ============================================================ */
function resolveUrl(url){
  var m=url.match(/instagram\.com\/(p|reel|tv)\/([\w-]+)/);
  if(m){
    toast('Resolving Instagram image...','info');
    return fetch('https://noembed.com/embed?url='+encodeURIComponent(url)).then(function(r){return r.json();}).then(function(d){
      if(d.thumbnail_url)return d.thumbnail_url;
      toast('Could not resolve. Use direct image link.','error');return null;
    }).catch(function(){toast('Network error resolving URL','error');return null;});
  }
  var pm=url.match(/pinterest\.com\/pin\/(\d+)/);
  if(pm){
    toast('Resolving Pinterest image...','info');
    return fetch('https://noembed.com/embed?url='+encodeURIComponent(url)).then(function(r){return r.json();}).then(function(d){
      if(d.thumbnail_url)return d.thumbnail_url;
      toast('Could not resolve Pinterest URL.','error');return null;
    }).catch(function(){toast('Network error','error');return null;});
  }
  return Promise.resolve(url);
}

/* ============================================================
   EFFECTS
   ============================================================ */
function initPtcl(){
  var c=document.getElementById('ptcl');
  for(var i=0;i<18;i++){var p=document.createElement('div');p.className='particle-3d';p.style.left=Math.random()*100+'%';p.style.animation='pFl '+(14+Math.random()*20)+'s '+(Math.random()*15)+'s linear infinite';p.style.width=p.style.height=(1.5+Math.random()*2.5)+'px';p.style.background=Math.random()>.5?'#D4A574':'#C78D6D';c.appendChild(p);}
}
function initReveal(){
  var o=new IntersectionObserver(function(entries){entries.forEach(function(x){if(x.isIntersecting)x.target.classList.add('visible');});},{threshold:.12,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.reveal,.reveal-left,.reveal-right,.reveal-scale').forEach(function(el){o.observe(el);});
}
function initTilt(){
  document.querySelectorAll('[data-tilt]').forEach(function(c){
    c.addEventListener('mousemove',function(e){var r=c.getBoundingClientRect();c.style.transform='perspective(800px) rotateY('+(((e.clientX-r.left)/r.width-.5)*8)+'deg) rotateX('+((-((e.clientY-r.top)/r.height-.5))*8)+'deg) translateZ(8px)';});
    c.addEventListener('mouseleave',function(){c.style.transform='perspective(800px) rotateY(0) rotateX(0) translateZ(0)';});
  });
}

function doRender(html){var app=document.getElementById('app');app.style.animation='none';app.offsetHeight;app.style.animation='';app.innerHTML=html;}
function afterRender(needBindBook,d,u){window.scrollTo(0,0);requestAnimationFrame(function(){initReveal();initTilt();if(needBindBook)bindBook(d,u);});}

/* ============================================================
   ROUTER (SINGLE CLEAN VERSION — NO OVERRIDE)
   ============================================================ */
function route(){
  var h=window.location.hash||'#/';

  /* 公开用户页面 /u/ID 或 /u/ID/book */
  var um=h.match(/^#\/u\/([^/]+)(\/book)?$/);
  if(um){
    var uid=um[1],isBook=!!um[2];
    VU=findUser(uid);
    if(VU){
      VD=getData(VU.id);
      doRender(isBook?bookHTML(VD,VU):portHTML(VD,VU));
      afterRender(isBook,VD,VU);
    } else {
      doRender(notFoundHTML());
      window.scrollTo(0,0);
    }
    return;
  }
  VU=null;VD=null;BK_DATA=null;BK_USER=null;

  if(h==='#/signup'){doRender(signupHTML());window.scrollTo(0,0);return;}
  if(h==='#/login'){doRender(loginHTML());window.scrollTo(0,0);return;}

  /* 需要登录 */
  if(h==='#/dashboard'||h==='#/book'){
    if(!CU){location.hash='#/login';return;}
    if(h==='#/book'){
      doRender(bookHTML(S,CU));
      afterRender(true,S,CU);
    } else {
      doRender(dashHTML());
      afterRender(false);
    }
    return;
  }

  /* 默认首页 */
  if(CU){doRender(portHTML(S,CU));}
  else{doRender(homeHTML());}
  afterRender(false);
}

/* ============================================================
   HOME PAGE
   ============================================================ */
function homeHTML(){
  return '<div class="min-h-screen flex items-center justify-center px-6 relative overflow-hidden" style="background:linear-gradient(135deg,#2A0E16,#3D1520,#2C2C2E);">'
    +'<div class="deco-orb" style="width:350px;height:350px;top:-100px;right:-80px;background:rgba(212,165,116,.1);"></div>'
    +'<div class="deco-orb" style="width:250px;height:250px;bottom:-60px;left:-60px;background:rgba(199,141,109,.08);"></div>'

function doSignup(){
  var n=document.getElementById('su-name').value.trim();
  var p=document.getElementById('su-pin').value.trim();
  var p2=document.getElementById('su-pin2').value.trim();
  if(!n){toast('Name is required','error');return;}
  if(!/^\d{4}$/.test(p)){toast('PIN must be 4 digits','error');return;}

}

function updSum(){if(!BK_DATA)return;var svc=null;for(var i=0;i<BK_DATA.services.length;i++){if(BK_DATA.services[i].id===selSvc){svc=BK_DATA.services[i];break;}}var el=document.getElementById('bk-summary');if(!el||!svc)return;el.innerHTML='<div class="flex justify-between"><span class="text-charcoal/50">Service</span><span class="font-500">'+esc(svc.name)+'</span></div><div class="flex justify-between"><span class="text-charcoal/50">Date</span><span class="font-500">'+(selDate?fmtDate(selDate):'—')+'</span></div><div class="line-gold my-2"></div><div class="flex justify-between font-700"><span>Total</span><span class="text-rose-gold-dark">'+fmtPrice(svc.price)+'</span></div>';}
function bindBook(d,u){BK_DATA=d;BK_USER=u;if(selSvc)updSum();}
function submitBK(){
  if(!BK_DATA)return;
  var n=document.getElementById('bk-n').value.trim(),ph=document.getElementById('bk-p').value.trim(),nt=document.getElementById('bk-nt').value.trim();
  var svc=null;for(var i=0;i<BK_DATA.services.length;i++){if(BK_DATA.services[i].id===selSvc){svc=BK_DATA.services[i];break;}}
  if(!n){toast('Name required','error');return;}if(!ph){toast('Phone required','error');return;}if(!selDate){toast('Select date','error');return;}if(!svc){toast('Select service','error');return;}
  BK_DATA.bookings.push({id:uid(),serviceId:selSvc,clientName:n,clientPhone:ph,bookingDate:selDate,notes:nt,status:'pending',createdAt:new Date().toISOString()});
  putData(BK_USER.id,BK_DATA);
  if(CU&&CU.id===BK_USER.id)S=getData(CU.id);
  var msg='*New Booking — ArtistHub*\n\n*Client:* '+n+'\n*Phone:* '+ph+'\n*Service:* '+svc.name+'\n*Date:* '+fmtDate(selDate)+'\n*Price:* '+fmtPrice(svc.price)+(nt?'\n*Notes:* '+nt:'')+'\n\nPlease confirm.';
  toast('Booking saved!');
  setTimeout(function(){window.open('https://wa.me/'+BK_DATA.profile.phone+'?text='+encodeURIComponent(msg),'_blank');},600);
}

function dashEdu(){
  var items='';
  for(var i=0;i<S.education.length;i++){
    var e=S.education[i];
    items+='<div class="glass rounded-2xl p-4 shadow-sm"><div class="flex items-start justify-between gap-3">'
      +'<div class="flex items-start gap-3 flex-1 min-w-0">'
      +'<div class="w-10 h-10 rounded-xl bg-gradient-to-br from-wine to-wine-soft flex items-center justify-center flex-shrink-0 shadow-md shadow-wine/15"><i class="fa-solid fa-graduation-cap text-gold text-sm"></i></div>'
      +'<div class="flex-1 min-w-0"><h3 class="font-600 text-charcoal text-sm">'+esc(e.course)+'</h3>'
      +'<p class="text-xs text-rose-gold-dark font-500 mt-0.5">'+esc(e.institution)+'</p>'
      +'<p class="text-[11px] text-charcoal/40 mt-0.5">'+esc(e.year)+'</p>'
      +(e.description?'<p class="text-[11px] text-charcoal/50 mt-1">'+esc(e.description)+'</p>':'')+'</div></div>'
      +'<div class="flex gap-1.5 flex-shrink-0">'
      +'<button onclick="editEdu(\''+e.id+'\')" class="w-8 h-8 rounded-lg flex items-center justify-center text-charcoal/30 hover:text-charcoal hover:bg-cream-dark transition"><i class="fa-solid fa-pen text-xs"></i></button>'
      +'<button onclick="rmEdu(\''+e.id+'\')" class="w-8 h-8 rounded-lg flex items-center justify-center text-red-400/60 hover:text-red-500 hover:bg-red-50 transition"><i class="fa-solid fa-trash-can text-xs"></i></button>'
      +'</div></div></div>';
  }
  return '<div class="reveal"><h2 class="font-display text-3xl font-700 text-charcoal mb-1">Education & Training</h2><p class="text-sm text-charcoal/40 font-300 mb-7">Where you learned your craft</p>'
    +'<div class="glass rounded-2xl p-5 mb-6 shadow-md shadow-gold/5">'
    +'<div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">'
    +'<div><label class="block text-[11px] font-600 text-charcoal/40 mb-1 uppercase tracking-[2px]">Institution</label><input id="de-i" class="field" placeholder="e.g. VLCC Institute" /></div>'
    +'<div><label class="block text-[11px] font-600 text-charcoal/40 mb-1 uppercase tracking-[2px]">Course</label><input id="de-c" class="field" placeholder="e.g. Diploma in Makeup" /></div></div>'
    +'<div class="mb-3"><label class="block text-[11px] font-600 text-charcoal/40 mb-1 uppercase tracking-[2px]">Year</label><input id="de-y" class="field" placeholder="2019 - 2020" /></div>'
    +'<div class="mb-3"><label class="block text-[11px] font-600 text-charcoal/40 mb-1 uppercase tracking-[2px]">Description</label><input id="de-d" class="field" placeholder="Details" /></div>'
    +'<button onclick="addEdu()" class="btn-gold btn-sm"><i class="fa-solid fa-plus mr-1"></i>Add Education</button></div>'
    +(S.education.length===0?'<div class="text-center py-16 glass rounded-2xl"><i class="fa-solid fa-graduation-cap text-4xl text-cream-warm mb-4 block"></i><p class="text-sm text-charcoal/40">None yet</p></div>'
    :'<div class="flex flex-col gap-3">'+items+'</div>')+'</div>';
}
function addEdu(){
  var i=document.getElementById('de-i').value.trim(),c=document.getElementById('de-c').value.trim(),y=document.getElementById('de-y').value.trim(),d=document.getElementById('de-d').value.trim();
  if(!i){toast('Institution required','error');return;}
  S.education.push({id:uid(),institution:i,course:c,year:y,description:d});putData(CU.id,S);S=getData(CU.id);toast('Added');route();
}
function rmEdu(id){S.education=S.education.filter(function(e){return e.id!==id;});putData(CU.id,S);S=getData(CU.id);toast('Deleted');route();}
function editEdu(id){
  var e=null;for(var i=0;i<S.education.length;i++){if(S.education[i].id===id){e=S.education[i];break;}}if(!e)return;
  var ni=prompt('Institution:',e.institution);if(ni===null)return;var nc=prompt('Course:',e.course);if(nc===null)return;
  var ny=prompt('Year:',e.year);if(ny===null)return;var nd=prompt('Description:',e.description);if(nd===null)return;
  e.institution=ni.trim()||e.institution;e.course=nc.trim();e.year=ny.trim();e.description=nd.trim();putData(CU.id,S);S=getData(CU.id);toast('Updated');route();
}

/* --- CALENDAR --- */
function dashCal(){
  var now=new Date();if(calY===undefined){calY=now.getFullYear();calM=now.getMonth();}
  var mN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var dN=['Su','Mo','Tu','We','Th','Fr','Sa'];
  var fd=new Date(calY,calM,1).getDay(),dim=new Date(calY,calM+1,0).getDate(),td=now.toISOString().split('T')[0];
  var cells='';for(var i=0;i<fd;i++)cells+='<div class="cal-cell empty"></div>';
  for(var d=1;d<=dim;d++){var ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var st=S.availability[ds];var cls='cal-cell';if(st==='busy')cls+=' busy';else if(st==='available')cls+=' available';if(ds===td)cls+=' today';cells+='<div class="'+cls+'" onclick="togCal(\''+ds+'\')">'+d+'</div>';}
  var dnHtml='';for(var i=0;i<dN.length;i++)dnHtml+='<div class="text-center text-[10px] font-600 text-charcoal/35 uppercase py-1 tracking-wider">'+dN[i]+'</div>';
  return '<div class="reveal"><h2 class="font-display text-3xl font-700 text-charcoal mb-1">Availability</h2><p class="text-sm text-charcoal/40 font-300 mb-6">Click: Unset → Available → Busy → Unset</p>'
    +'<div class="flex gap-5 mb-5"><div class="flex items-center gap-2"><div class="w-4 h-4 rounded-lg bg-gradient-to-br from-[#1A3D20] to-[#2D5A35]"></div><span class="text-xs text-charcoal/50">Available</span></div>'
    +'<div class="flex items-center gap-2"><div class="w-4 h-4 rounded-lg bg-gradient-to-br from-[#5A1A1A] to-[#7A2A2A]"></div><span class="text-xs text-charcoal/50">Busy</span></div>'
    +'<div class="flex items-center gap-2"><div class="w-4 h-4 rounded-lg border border-cream-warm"></div><span class="text-xs text-charcoal/50">Not set</span></div></div>'
    +'<div class="flex items-center justify-between mb-4">'
    +'<button onclick="calNav(-1)" class="w-10 h-10 rounded-xl border border-cream-warm flex items-center justify-center hover:bg-cream-dark transition"><i class="fa-solid fa-chevron-left text-xs text-charcoal"></i></button>'
    +'<h3 class="font-display text-xl font-600 text-charcoal">'+mN[calM]+' '+calY+'</h3>'
    +'<button onclick="calNav(1)" class="w-10 h-10 rounded-xl border border-cream-warm flex items-center justify-center hover:bg-cream-dark transition"><i class="fa-solid fa-chevron-right text-xs text-charcoal"></i></button></div>'
    +'<div class="grid grid-cols-7 gap-1 mb-2">'+dnHtml+'</div>'
    +'<div class="grid grid-cols-7 gap-1 justify-items-center">'+cells+'</div></div>';
}
function calNav(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}route();}
function togCal(ds){var c=S.availability[ds];if(!c)S.availability[ds]='available';else if(c==='available')S.availability[ds]='busy';else delete S.availability[ds];putData(CU.id,S);S=getData(CU.id);route();}

/* --- PAYMENT --- */
function dashPay(){
  return '<div class="reveal"><h2 class="font-display text-3xl font-700 text-charcoal mb-1">UPI Payment</h2><p class="text-sm text-charcoal/40 font-300 mb-7">QR code for clients</p>'
    +'<div class="mb-4"><label class="block text-[11px] font-600 text-charcoal/40 mb-1.5 uppercase tracking-[2px]">QR Code Image URL</label><input id="dpm-u" class="field" value="'+esc(S.profile.upiQrUrl)+'" placeholder="Paste UPI QR image URL" /></div>'
    +(S.profile.upiQrUrl?'<div class="flex justify-center mb-5"><div class="img-wrap w-44 h-44 rounded-2xl overflow-hidden border border-cream-warm shadow-lg"><img src="'+esc(S.profile.upiQrUrl)+'" class="w-full h-full" onerror="imgErr(this)" alt="QR" /><div class="img-fb w-full h-full items-center justify-center bg-cream-dark rounded-2xl"><i class="fa-solid fa-qrcode text-cream-warm text-3xl"></i></div></div></div>':'')
    +'<button onclick="S.profile.upiQrUrl=document.getElementById(\'dpm-u\').value.trim();putData(CU.id,S);S=getData(CU.id);toast(\'QR saved\');route();" class="btn-gold w-full py-3.5 rounded-2xl">Save QR Code</button>'
    +'<div class="line-gold my-8"></div>'
    +'<h3 class="font-display text-xl font-600 text-charcoal mb-1">Dashboard PIN</h3><p class="text-sm text-charcoal/40 font-300 mb-4">4-digit login code</p>'
    +'<div class="flex gap-2"><input id="dpm-pin" class="field w-36" type="password" maxlength="4" placeholder="****" /><button onclick="updatePin()" class="btn-outline btn-sm">Update</button></div></div>';
}
function updatePin(){
  var p=document.getElementById('dpm-pin').value.trim();
  if(!/^\d{4}$/.test(p)){toast('4 digits required','error');return;}
  S.pin=p;CU.pin=p;putUsers(getUsers());putData(CU.id,S);S=getData(CU.id);toast('PIN updated');route();
}

/* --- BOOKINGS --- */
function dashBk(){
  var bk=S.bookings.slice().reverse();
  var items='';
  for(var i=0;i<bk.length;i++){
    var b=bk[i];var svc=null;for(var j=0;j<S.services.length;j++){if(S.services[j].id===b.serviceId){svc=S.services[j];break;}}
    var stCls=b.status==='pending'?'bg-gold/10 text-rose-gold-dark':b.status==='confirmed'?'bg-green-50 text-green-600':'bg-red-50 text-red-500';
    var cnfBtn=b.status==='pending'?'<button onclick="updBk(\''+b.id+'\',\'confirmed\')" class="btn-gold btn-sm text-xs py-2">Confirm</button>':'';
    items+='<div class="glass rounded-2xl p-5 shadow-sm">'
      +'<div class="flex items-start justify-between mb-2"><div><h3 class="font-600 text-charcoal text-sm">'+esc(b.clientName)+'</h3><p class="text-xs text-charcoal/40">'+esc(b.clientPhone)+'</p></div>'
      +'<span class="text-[9px] uppercase tracking-[1.5px] font-600 px-2.5 py-1 rounded-full '+stCls+'">'+esc(b.status)+'</span></div>'
      +'<div class="flex flex-wrap gap-x-4 gap-y-1 text-xs text-charcoal/50">'
      +(svc?'<span><i class="fa-solid fa-scissors mr-1 text-gold/60"></i>'+esc(svc.name)+'</span>':'')
      +'<span><i class="fa-regular fa-calendar mr-1 text-gold/60"></i>'+fmtDate(b.bookingDate)+'</span>'
      +(svc?'<span class="font-700 text-charcoal">'+fmtPrice(svc.price)+'</span>':'')+'</div>'
      +(b.notes?'<p class="text-xs text-charcoal/40 mt-2 italic">"'+esc(b.notes)+'"</p>':'')
      +'<div class="flex gap-2 mt-3">'+cnfBtn+'<button onclick="updBk(\''+b.id+'\',\'cancelled\')" class="btn-danger btn-sm">Cancel</button></div></div>';
  }
  return '<div class="reveal"><h2 class="font-display text-3xl font-700 text-charcoal mb-1">Bookings</h2><p class="text-sm text-charcoal/40 font-300 mb-7">'+bk.length+' total</p>'
    +(bk.length===0?'<div class="text-center py-20 glass rounded-2xl"><i class="fa-regular fa-calendar-check text-5xl text-cream-warm mb-4 block"></i><p class="text-sm text-charcoal/40">No bookings yet</p></div>'
    :'<div class="flex flex-col gap-3">'+items+'</div>')+'</div>';
}
function updBk(id,st){
  var b=null;for(var i=0;i<S.bookings.length;i++){if(S.bookings[i].id===id){b=S.bookings[i];break;}}if(!b)return;
  b.status=st;putData(CU.id,S);S=getData(CU.id);toast('Booking '+st,st==='confirmed'?'success':'info');route();
}

/* ============================================================
   PDF EXPORT
   ============================================================ */
function exportPDF(){
  var jsPDF=window.jspdf.jsPDF;var doc=new jsPDF({orientation:'portrait',unit:'mm',format:[148,210]});
  var p=S.profile,w=148,h=210,bg=p.heroBg||'#2A0E16';
  var c=hex2rgb(bg);var L=isLight(bg);
  doc.setFillColor(c[0],c[1],c[2]);doc.rect(0,0,w,h,'F');
  var d2=hex2rgb(adjCol(bg,-15));doc.setFillColor(d2[0],d2[1],d2[2],40);doc.rect(0,0,w,h*.35,'F');
  var tc=L?[28,28,30]:[251,248,245],sc=L?[160,107,72]:[232,192,142],mc=L?[128,125,120]:[251,248,245];
  doc.setDrawColor(sc[0],sc[1],sc[2]);doc.setLineWidth(.5);doc.line(15,12,w-15,12);
  var self=this;
  loadImg(p.profileImageUrl).then(function(d){
    if(d){doc.addImage(d,'JPEG',w/2-20,17,40,52);}
    else{doc.setFillColor(44,44,46);doc.circle(w/2,42,18,'F');doc.setTextColor(212,165,116);doc.setFontSize(20);doc.text('?',w/2,47,{align:\'center\'});}
    doc.setTextColor(tc[0],tc[1],tc[2]);doc.setFont('helvetica','bold');doc.setFontSize(19);doc.text(p.name||'Artist',w/2,78,{align:'center'});
    doc.setTextColor(sc[0],sc[1],sc[2]);doc.setFont('helvetica','normal');doc.setFontSize(8);doc.text(p.tagline||'',w/2,84,{align:'center',maxWidth:w-40});
    var y=89;
    if(p.bio){doc.setDrawColor(sc[0],sc[1],sc[2]);doc.setLineWidth(.2);doc.line(30,y,w-30,y);y+=4;doc.setTextColor(mc[0],mc[1],mc[2]);doc.setFontSize(6.5);doc.text(p.bio.substring(0,220),w/2,y,{align:'center',maxWidth:w-28});y+=12;doc.line(30,y,w-30,y);y+=5;}
    if(S.achievements.length>0){doc.setTextColor(sc[0],sc[1],sc[2]);doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text('ACHIEVEMENTS',w/2,y,{align:'center'});y+=5;doc.setFont('helvetica','normal');doc.setFontSize(6.5);for(var i=0;i<Math.min(5,S.achievements.length);i++){var a=S.achievements[i];doc.setTextColor(sc[0],sc[1],sc[2]);doc.text(a.title,20,y);doc.setTextColor(mc[0],mc[1],mc[2]);doc.text(a.institution+' · '+a.year,20,y+3,{maxWidth:w-40});y+=7;}y+=2;doc.line(25,y,w-25,y);y+=5;}
    if(S.education.length>0){doc.setTextColor(sc[0],sc[1],sc[2]);doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text('EDUCATION',w/2,y,{align:'center'});y+=5;doc.setFont('helvetica','normal');doc.setFontSize(6.5);for(var i=0;i<Math.min(3,S.education.length);i++){var e=S.education[i];doc.setTextColor(sc[0],sc[1],sc[2]);doc.text(e.course||'Course',20,y);doc.setTextColor(mc[0],mc[1],mc[2]);doc.text(e.institution+' · '+e.year,20,y+3,{maxWidth:w-40});y+=7;}y+=2;doc.line(25,y,w-25,y);y+=5;}
    doc.setTextColor(sc[0],sc[1],sc[2]);doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text('SERVICES',w/2,y,{align:'center'});y+=5;doc.setFont('helvetica','normal');doc.setFontSize(7.5);for(var i=0;i<S.services.length;i++){var s=S.services[i];doc.setTextColor(sc[0],sc[1],sc[2]);doc.text(s.name,20,y);doc.setTextColor(tc[0],tc[1],tc[2]);doc.text(fmtPrice(s.price),w-20,y,{align:'right'});y+=5.5;}
    y=Math.max(y+5,155);doc.line(25,y,w-25,y);y+=7;doc.setTextColor(sc[0],sc[1],sc[2]);doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text('BOOK NOW',w/2,y,{align:'center'});y+=5.5;doc.setFont('helvetica','normal');doc.setFontSize(7);
    if(p.phone){doc.text('Phone: '+p.phone,w/2,y,{align:'center'});y+=4;}
    if(p.instagram){doc.text('Instagram: @'+handle(p.instagram),w/2,y,{align:'center'});y+=4;}
    if(p.whatsapp){doc.text('WhatsApp: '+p.whatsapp,w/2,y,{align:'center'});y+=4;}
    if(p.upiQrUrl){loadImg(p.upiQrUrl).then(function(qd){if(qd)doc.addImage(qd,'JPEG',w/2-12,y+2,24,24);doc.setTextColor(120,115,105);doc.setFontSize(5);doc.text('Scan to pay via UPI',w/2,y+29,{align:'center'});doc.setDrawColor(sc[0],sc[1],sc[2]);doc.setLineWidth(.4);doc.line(15,h-10,w-15,h-10);doc.setTextColor(80,75,70);doc.setFontSize(4.5);doc.text('Generated by ArtistHub',w/2,h-6,{align:'center'});doc.save((p.name||'portfolio').replace(/\s+/g,'_')+'_Pamphlet.pdf');toast('PDF downloaded');});}
  }).catch(function(){
    doc.setTextColor(tc[0],tc[1],tc[2]);doc.setFont('helvetica','bold');doc.setFontSize(19);doc.text(p.name||'Artist',w/2,42,{align:'center'});
    var y=50;if(p.tagline){doc.setTextColor(sc[0],sc[1],sc[2]);doc.setFontSize(8);doc.text(p.tagline,w/2,y,{align:'center',maxWidth:w-40});y+=10;}
    if(S.services.length>0){doc.setFontSize(9);doc.text('SERVICES',w/2,y,{align:'center'});y+=6;doc.setFontSize(7.5);for(var i=0;i<S.services.length;i++){doc.text(S.services[i].name,20,y);doc.text(fmtPrice(S.services[i].price),w-20,y,{align:'right'});y+=5;5;}}
    doc.save((p.name||'portfolio').replace(/\s+/g,'_')+'_Pamphlet.pdf');toast('PDF downloaded');
  });
}
function loadImg(url){return new Promise(function(res,rej){var img=new Image();img.crossOrigin='anonymous';img.onload=function(){var c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;c.getContext('2d').drawImage(img,0,0);res(c.toDataURL('image/jpeg',.85));};img.onerror=function(){rej();};img.src=url;setTimeout(rej,5000);});}

   ============================================================ */
initAuth();
initPtcl();
window.addEventListener('hashchange', route);
route();
